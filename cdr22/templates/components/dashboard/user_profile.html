<!-- Componente de perfil de usuario -->
<div class="auth_user_menu">
    <button type="button" class="auth_user_menu_button">
        <!-- Círculo con inicial -->
        <div class="w-10 h-10 bg-primary text-primary-foreground rounded-full flex items-center justify-center font-semibold text-lg">
            {% if user.first_name %}
                {{ user.first_name|slice:":1"|upper }}
            {% else %}
                {{ user.username|slice:":1"|upper }}
            {% endif %}
        </div>

        <!-- Información del usuario -->
        <div class="hidden md:block text-left">
            <p class="text-sm font-medium">
                {% if user.first_name and user.last_name %}
                    {{ user.first_name }} {{ user.last_name }}
                {% elif user.first_name %}
                    {{ user.first_name }}
                {% else %}
                    {{ user.username }}
                {% endif %}
            </p>
            <p class="text-xs text-secondary-foreground/70">{{ user.email|default:"Usuario" }}</p>
        </div>

        <span class="hidden md:block text-secondary-foreground/70">
            {% include "components/icons/chevron_down.html" %}
        </span>
    </button>

    <div class="auth_user_menu_panel">
        <a class="auth_user_menu_item" href="{% url 'mi_perfil' %}">Mi perfil</a>
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="auth_user_menu_item auth_user_menu_item_danger">
                Cerrar sesión
            </button>
        </form>
    </div>
</div>
