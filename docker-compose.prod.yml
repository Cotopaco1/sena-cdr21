x-web-environment: &web-environment
  DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
  SECRET_KEY: ${SECRET_KEY:?Configure SECRET_KEY in Coolify}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
  SQLITE_PATH: /data/db.sqlite3
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-20}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@localhost}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-120} --access-logfile - --error-logfile - --capture-output --log-level ${GUNICORN_LOG_LEVEL:-info}
    environment: *web-environment
    volumes:
      - cdr22-data:/data
      - cdr22-media:/app/media
      - cdr22-static:/app/staticfiles
    expose:
      - "8000"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    expose:
      - "80"
    volumes:
      - cdr22-media:/app/media:ro
      - cdr22-static:/app/staticfiles:ro

volumes:
  cdr22-data:
  cdr22-media:
  cdr22-static:
